services:

  # ── MLflow UI ──────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlflow.db:/app/mlflow.db
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root ./mlruns
    restart: unless-stopped

  # ── Pipeline de entrenamiento (se corre una vez con: docker compose run --rm pipeline) ──
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./reportes:/app/reportes
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=file:///app/mlruns
    # Por defecto usa datos sintéticos; cambiar a: python main.py  para datos reales
    command: python main.py --sintetico
    profiles:
      - train

  # ── API FastAPI ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: serve/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./artifacts:/app/artifacts
    environment:
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db
      - UMBRAL_FRAUDE=0.50
    restart: unless-stopped
    # La API necesita que los artifacts existan (correr pipeline primero)
